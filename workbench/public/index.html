<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workbench</title>
<script>
// Applied before first paint so a saved light/dark choice never flashes the
// system-default theme first. "system" (or nothing saved) sets no attribute,
// leaving the prefers-color-scheme media query in styles.css to decide.
(function () {
  try {
    var saved = localStorage.getItem('workbench-theme');
    if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
  } catch (e) {}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <h1>Workbench</h1>
      <p>Research → Ideas → Drafting → Published</p>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" id="themeToggle" role="group" aria-label="Theme">
        <button type="button" data-theme-choice="system">System</button>
        <button type="button" data-theme-choice="light">Light</button>
        <button type="button" data-theme-choice="dark">Dark</button>
      </div>
      <button class="btn accent-idea" id="newCardBtn">+ New card</button>
    </div>
  </header>

  <nav class="tabs">
    <button data-view="board" class="active">Board</button>
    <button data-view="calendar">Calendar</button>
    <button data-view="published">Published</button>
    <button data-view="held" class="tab-quiet">Held<span id="heldBadge" class="tab-badge" style="display:none;"></span></button>
    <button data-view="archived" class="tab-quiet">Archived<span id="archivedBadge" class="tab-badge" style="display:none;"></span></button>
  </nav>

  <section id="view-board" class="view active">
    <div class="board" id="boardColumns"></div>
  </section>

  <section id="view-calendar" class="view">
    <div class="calendar-layout">
      <div class="calendar-main">
        <div class="cal-nav">
          <div class="cal-nav-side">
            <button class="btn cal-today-btn" id="calToday">Today</button>
            <button class="btn" id="calPrev">&larr;</button>
          </div>
          <h2 id="calLabel"></h2>
          <div class="cal-nav-side">
            <button class="btn" id="calNext">&rarr;</button>
          </div>
        </div>
        <div class="cal-dow">
          <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="calendar-side">
        <h3>Ready, unscheduled</h3>
        <div id="readyList" class="cards"></div>
      </div>
    </div>
  </section>

  <section id="view-published" class="view">
    <div id="publishedList" class="detail-list"></div>
  </section>

  <section id="view-held" class="view">
    <div id="heldList" class="detail-list"></div>
  </section>

  <section id="view-archived" class="view">
    <div id="archivedList" class="detail-list"></div>
  </section>

</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal" id="cardModal"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
